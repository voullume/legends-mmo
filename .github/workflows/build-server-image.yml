name: build-server-image

# Build the dedicated zone-server Docker image OFF the droplet (GitHub's runners have plenty of RAM),
# then push it to GHCR. The droplet's deploy/setup.sh pulls this prebuilt image instead of building
# on-box — so a redeploy is a fast `docker pull` that can never OOM/swap-thrash the 1 GB droplet.
# The image contains no secrets (the SUPABASE_SERVICE_KEY is injected at `docker run`, not baked in).

on:
  push:
    branches: [main]
  workflow_dispatch: {}        # also runnable on demand from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io under this repo's owner
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/voullume/legends-mmo:latest
            ghcr.io/voullume/legends-mmo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
